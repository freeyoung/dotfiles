# Keep tmux's default Ctrl-B prefix. Only a few bindings below depart from
# tmux defaults: path-preserving splits, Vim pane navigation, and reload.

# Use tmux's 256-color terminal description.
set -g default-terminal "tmux-256color"
# Advertise true-color support to applications inside tmux.
set -as terminal-features ",xterm-256color:RGB"
# Avoid delaying escape-sequence interpretation.
set -sg escape-time 0
# Let editors know when the terminal gains or loses focus.
set -g focus-events on
# Allow mouse selection, pane resizing, and window switching.
set -g mouse on
# Keep a large scrollback buffer per pane.
set -g history-limit 100000
# Forward tmux clipboard changes to the terminal clipboard.
set -s set-clipboard on

# Refresh the status line every second so the clock's seconds stay current.
set -g status-interval 1
# Keep status messages visible for three seconds.
set -g display-time 3000
# Close numbering gaps when windows are closed.
set -g renumber-windows on

# Use Tomorrow Night Bright colors for the status line.
set -g status-style "bg=#000000,fg=#eaeaea"
# Highlight copy-mode selections with Tomorrow's yellow and black text.
set -g mode-style "fg=#000000,bg=#e7c547"
# Reserve enough space for the session name on the left.
set -g status-left-length 20
# Reserve enough space for host, date, and time on the right.
set -g status-right-length 50
# Show the session name in Tomorrow's blue with dark text.
set -g status-left "#[fg=#000000,bg=#7aa6da,bold] #S #[default]"
# Show host, date, and time as cyan, yellow, and green segments.
set -g status-right "#[fg=#000000,bg=#70c0b1] #H #[fg=#000000,bg=#e7c547] %Y-%m-%d #[fg=#000000,bg=#b9ca4a] %H:%M:%S #[default]"

# Split horizontally, inherit the directory, and balance the layout.
bind % split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
# Split vertically, inherit the directory, and balance the layout.
bind '"' split-window -v -c "#{pane_current_path}" \; select-layout even-vertical
# Split horizontally, inherit the directory, and balance the layout.
bind | split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
# Split vertically, inherit the directory, and balance the layout.
bind - split-window -v -c "#{pane_current_path}" \; select-layout even-vertical
# Move left; repeatable without pressing the prefix again.
bind -r h select-pane -L
# Move down; repeatable without pressing the prefix again.
bind -r j select-pane -D
# Move up; repeatable without pressing the prefix again.
bind -r k select-pane -U
# Move right; repeatable without pressing the prefix again.
bind -r l select-pane -R
# Cycle to the next pane.
bind Tab select-pane -t:.+
# Cycle to the previous pane.
bind BTab select-pane -t:.-
# Grow the pane to the left by five cells.
bind -r < resize-pane -L 5
# Grow the pane to the right by five cells.
bind -r > resize-pane -R 5
# Grow the pane upward by five cells.
bind -r + resize-pane -U 5

# Use Vim-style keys while navigating copy mode.
setw -g mode-keys vi
# Start a visual selection in copy mode.
bind -T copy-mode-vi v send -X begin-selection
# Copy the selection and leave copy mode.
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# Copy the selection and leave copy mode with Enter.
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

# Open tmux's command prompt.
bind : command-prompt
# Reload this configuration and show a confirmation message.
bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux.conf"
