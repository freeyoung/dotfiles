# Keep tmux's default Ctrl-B prefix. The bindings below retain the Screen and
# Vim muscle memory used by this configuration without carrying the old sample
# configuration wholesale.

# Modern terminal integration.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -sg escape-time 0
set -g focus-events on
set -g mouse on
set -g history-limit 100000
set -s set-clipboard on

# Predictable, manually named windows.
set -g status-justify left
set -g status-interval 15
set -g display-time 3000
set -g automatic-rename off
set -g allow-rename off
set -g renumber-windows on

# Status line: intentionally portable (no Linux-only /proc probes).
set -g status-style "bg=black,fg=white"
set -g mode-style "fg=blue,bg=yellow"
set -g status-left-length 20
set -g status-right-length 50
set -g status-left "#[fg=white,bg=blue,bold] #S #[default] "
set -g status-right "#[fg=cyan]#H #[default] #[fg=yellow]%Y-%m-%d #[fg=green]%H:%M"

# Screen-compatible window controls.
unbind C-x
bind C-x lock-server
unbind x
bind x lock-server
unbind C-c
bind C-c new-window
unbind c
bind c new-window
unbind C-d
bind C-d detach
unbind C-@
bind C-@ next-window
unbind C-n
bind C-n next-window
unbind Space
bind Space next-window
unbind n
bind n next-window
unbind A
bind A command-prompt "rename-window %%"
unbind C-a
bind C-a last-window
unbind C-h
bind C-h previous-window
unbind C-p
bind C-p previous-window
unbind p
bind p previous-window
unbind BSpace
bind BSpace previous-window
unbind C-w
bind C-w list-windows
unbind w
bind w list-windows
unbind \\
bind \\ confirm-before "kill-server"
unbind K
bind K confirm-before "kill-window"
unbind k
bind k confirm-before "kill-window"
unbind C-l
bind C-l refresh-client
unbind l
bind l refresh-client
unbind '"'
bind '"' choose-window

# Pane and window navigation. Splits always inherit the active pane's path.
unbind |
bind | split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind Tab select-pane -t:.+
bind BTab select-pane -t:.-
bind -r < resize-pane -L 5
bind -r > resize-pane -R 5
bind -r - resize-pane -D 5
bind -r + resize-pane -U 5

# Vi copy mode. `set-clipboard` exports tmux's buffer through terminals that
# support OSC 52 (including modern iTerm); y also remains a normal tmux copy.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

# Convenience.
bind : command-prompt
bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux.conf"
